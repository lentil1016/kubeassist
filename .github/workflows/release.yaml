name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE_REPO: docker.io/lentil1016

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp-server/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: |
          cd mcp-server && go test ./... && cd ..
          cd backend && go test ./... && cd ..
          cd test && go test ./... && cd ..

      - name: Set version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          declare -A dirs=( [mcp]=mcp-server [backend]=backend [frontend]=frontend )
          for comp in mcp backend frontend; do
            docker build -t $IMAGE_REPO/kubeassist-${comp}:${VERSION} \
                          -t $IMAGE_REPO/kubeassist-${comp}:latest \
                          ${dirs[$comp]}/
            docker push $IMAGE_REPO/kubeassist-${comp}:${VERSION}
            docker push $IMAGE_REPO/kubeassist-${comp}:latest
          done

      - name: Save images for air-gap
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          docker save \
            $IMAGE_REPO/kubeassist-mcp:${VERSION} \
            $IMAGE_REPO/kubeassist-backend:${VERSION} \
            $IMAGE_REPO/kubeassist-frontend:${VERSION} \
            | gzip > kubeassist-images-${VERSION}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kubeassist-images-*.tar.gz
