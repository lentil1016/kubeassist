apiVersion: v1
kind: Service
metadata:
  name: kubeassist-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubeassist-backend
    {{- include "kubeassist.labels" . | nindent 4 }}
spec:
  selector:
    app: kubeassist-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
