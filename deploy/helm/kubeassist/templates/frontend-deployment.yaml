apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeassist-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubeassist-frontend
    {{- include "kubeassist.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeassist-frontend
  template:
    metadata:
      labels:
        app: kubeassist-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: {{ .Values.image.registry }}/kubeassist-frontend:{{ .Values.image.tag }}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
