apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeassist-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubeassist-mcp
    {{- include "kubeassist.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeassist-mcp
  template:
    metadata:
      labels:
        app: kubeassist-mcp
    spec:
      serviceAccountName: kubeassist-mcp
      containers:
        - name: mcp-server
          image: {{ .Values.image.registry }}/kubeassist-mcp:{{ .Values.image.tag }}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
