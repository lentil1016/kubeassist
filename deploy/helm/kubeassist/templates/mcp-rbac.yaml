apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeassist-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeassist.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeassist-mcp
  labels:
    {{- include "kubeassist.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeassist-mcp
  labels:
    {{- include "kubeassist.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeassist-mcp
subjects:
  - kind: ServiceAccount
    name: kubeassist-mcp
    namespace: {{ .Release.Namespace }}
