# KubeAssist Helm Values
# Only values that users typically need to change are exposed here.

# Required: Anthropic API key for Claude
anthropicApiKey: ""

# Optional: Custom Claude API base URL (e.g. for proxies)
# Leave empty to use the official Anthropic API endpoint.
anthropicBaseUrl: ""

image:
  # Image registry prefix. Override for air-gapped or mirrored environments.
  registry: docker.io/lentil1016
  # Image tag shared by all three components
  tag: latest

frontend:
  service:
    # Service type: ClusterIP, NodePort, or LoadBalancer
    type: ClusterIP
